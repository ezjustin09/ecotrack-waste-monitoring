<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Analytics</title>
    <link rel="stylesheet" href="/admin/styles.css?v=20260411c" />
  </head>
  <body data-page="analytics">
    <div class="admin-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <h2><span class="logo-mark">ET</span> Eco<span>Track</span></h2>
        </div>
        <nav class="menu">
          <a class="menu-item" data-page-link="dashboard" href="/admin/dashboard.html">Dashboard</a>
          <a class="menu-item" data-page-link="schedule" href="/admin/schedule.html">Schedule Management</a>
          <a class="menu-item" data-page-link="reports" href="/admin/reports.html">Issue Reports</a>
          <a class="menu-item" data-page-link="drivers" href="/admin/drivers.html">Truck Drivers</a>
          <a class="menu-item" data-page-link="announcements" href="/admin/announcements.html">Announcements</a>
          <a class="menu-item" data-page-link="news" href="/admin/news.html">News</a>
          <a class="menu-item" data-page-link="analytics" href="/admin/analytics.html">Analytics</a>
          <a class="menu-item" data-page-link="settings" href="/admin/settings.html">Settings</a>
        </nav>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <h1>Analytics</h1>
          <div class="topbar-right">
            <label class="search-box">
              <span>Search</span>
              <input id="searchInput" type="search" placeholder="Search status or truck" />
            </label>
            <button id="logoutButton" class="logout-button" type="button">Log out</button>
          </div>
        </header>

        <section class="section-block">
          <div class="stat-grid">
            <article class="stat-card green">
              <p>Active Trucks</p>
              <h3 id="activeTrucks">0</h3>
              <small>Live telemetry</small>
            </article>
            <article class="stat-card amber">
              <p>Reports Today</p>
              <h3 id="reportsToday">0</h3>
              <small>Daily volume</small>
            </article>
            <article class="stat-card red">
              <p>Total Reports</p>
              <h3 id="reportsTotal">0</h3>
              <small>Overall load</small>
            </article>
            <article class="stat-card green-soft">
              <p>Schedules</p>
              <h3 id="scheduleTotal">0</h3>
              <small>Configured slots</small>
            </article>
          </div>

          <article class="card panel">
            <div class="panel-heading">
              <h2>Status Distribution</h2>
              <button id="refreshButton" class="refresh-button" type="button">Refresh</button>
            </div>
            <div id="statusChips" class="status-chips"></div>
            <div id="statusBars" class="bar-list"></div>
          </article>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/admin/admin-pages.js?v=20260411b" defer></script>
  </body>
</html>
