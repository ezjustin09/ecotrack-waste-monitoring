<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Settings</title>
    <link rel="stylesheet" href="/admin/styles.css" />
  </head>
  <body data-page="settings">
    <div class="admin-shell">
      <aside class="sidebar">
        <div class="brand-block">
          <h2><span class="logo-mark">ET</span> Eco<span>Track</span></h2>
        </div>
        <nav class="menu">
          <a class="menu-item" data-page-link="dashboard" href="/admin/dashboard.html">Dashboard</a>
          <a class="menu-item" data-page-link="schedule" href="/admin/schedule.html">Schedule Management</a>
          <a class="menu-item" data-page-link="reports" href="/admin/reports.html">Issue Reports</a>
          <a class="menu-item" data-page-link="drivers" href="/admin/drivers.html">Truck Drivers</a>
          <a class="menu-item" data-page-link="analytics" href="/admin/analytics.html">Analytics</a>
          <a class="menu-item" data-page-link="settings" href="/admin/settings.html">Settings</a>
        </nav>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <h1>Settings</h1>
          <div class="topbar-right">
            <button id="logoutButton" class="logout-button" type="button">Log out</button>
          </div>
        </header>

        <section class="section-block">
          <article class="card panel">
            <div class="panel-heading">
              <h2>Backend Configuration</h2>
              <button id="refreshButton" class="refresh-button" type="button">Refresh</button>
            </div>
            <p class="settings-text">Admin credentials are controlled by backend environment variables <code>ADMIN_USER</code> and <code>ADMIN_PASSWORD</code>.</p>
            <p class="settings-text">Database type: <strong id="dbType">Loading...</strong></p>
            <p class="settings-text">Database name: <strong id="dbName">Loading...</strong></p>
          </article>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/admin/admin-pages.js" defer></script>
  </body>
</html>
